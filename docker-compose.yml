services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: videogen
      POSTGRES_USER: videogen
      POSTGRES_PASSWORD: videogen
    volumes: [postgres_data:/var/lib/postgresql/data]
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videogen -d videogen"]
      interval: 5s
      timeout: 5s
      retries: 10
  backend:
    build:
      context: ./backend
      dockerfile: src/VideoGen.Api/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=videogen;Username=videogen;Password=videogen
      OpenAI__ApiKey: ${OPENAI_API_KEY:?Set OPENAI_API_KEY in your environment or .env file}
      OpenAI__Model: ${OPENAI_MODEL:-gpt-4o-mini}
      ComfyUI__BaseUrl: ${COMFYUI_BASE_URL:-http://host.docker.internal:8188}
    volumes:
      - ./backend/data/uploads:/app/uploads
      - ./backend/data/outputs:/app/outputs
    ports: ["8080:8080"]
    depends_on:
      postgres: { condition: service_healthy }
    extra_hosts: ["host.docker.internal:host-gateway"]
  frontend:
    build: ./frontend
    ports: ["4200:80"]
    depends_on: [backend]
volumes:
  postgres_data:
